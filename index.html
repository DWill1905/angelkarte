<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Angelkarte</title>
<meta name="theme-color" content="#0f2b30">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --ink:#0d1f22; --panel:#0f2b30; --panel-2:#12343b; --paper:#e9efe9;
    --line:#2a4d54; --text:#dce8e4; --muted:#8fb0ac;
    --raub:#e4572e; --salmo:#4cb8d4; --fried:#8fb069; --forelle:#e8b93c; --sperr:#8a93a0;
    --warn:#c94f3d; --ok:#6fae6f;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--ink);color:var(--text);
    display:grid;grid-template-rows:auto auto auto 1fr auto auto;
    height:100vh;height:100dvh;overflow:hidden;
  }
  header{background:var(--panel);border-bottom:1px solid var(--line);padding:10px 14px 8px}
  .eyebrow{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
  h1{font-family:Georgia,'Times New Roman',serif;font-size:19px;font-weight:700;color:#f2f7f4}
  h1 .tilde{color:var(--salmo);font-weight:400}
  .sun{font-size:11px;color:var(--muted);margin-top:3px}

  .banner{
    background:#3a1f1a;border-bottom:1px solid #5c2e24;color:#f0c4b8;
    font-size:12px;padding:7px 14px;display:none;line-height:1.4;
  }
  .banner.show{display:block}
  .banner b{color:#ffd9cf}

  .tabs{display:flex;background:var(--panel);border-bottom:1px solid var(--line)}
  .tab{
    flex:1;background:none;border:0;color:var(--muted);font-size:12px;font-weight:700;
    letter-spacing:.08em;text-transform:uppercase;padding:10px 4px;cursor:pointer;
    border-bottom:2px solid transparent;
  }
  .tab[aria-selected="true"]{color:#f2f7f4;border-bottom-color:var(--salmo)}
  .tab:focus-visible{outline:2px solid var(--salmo);outline-offset:-2px}

  .view{display:none;min-height:0;overflow:hidden;grid-row:4;position:relative;flex-direction:column}
  .view.active{display:flex}

  /* ===== Karte ===== */
  .chips{display:flex;gap:6px;overflow-x:auto;padding:8px 14px;background:var(--panel);
    border-bottom:1px solid var(--line);scrollbar-width:none;flex-shrink:0}
  .chips::-webkit-scrollbar{display:none}
  .chip{display:flex;align-items:center;gap:6px;white-space:nowrap;font-size:12px;font-weight:600;
    color:var(--text);background:var(--panel-2);border:1px solid var(--line);border-radius:999px;
    padding:7px 12px;cursor:pointer;user-select:none;min-height:32px}
  .chip .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .chip.off{opacity:.38}
  .chip:focus-visible{outline:2px solid var(--salmo);outline-offset:2px}
  .chips.sub{background:var(--ink);padding-top:6px;padding-bottom:6px}
  .chips.sub .chip{background:transparent;border-color:var(--line);color:var(--muted);min-height:28px;padding:5px 11px}
  .chips.sub .chip.on{background:var(--salmo);border-color:var(--salmo);color:#082226;opacity:1}
  #map{flex:1;min-height:0;background:#0d1f22;z-index:0}
  .leaflet-container{font:inherit}

  .locbtn{
    position:absolute;right:10px;bottom:calc(46px + 28px);z-index:500;
    background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:8px;
    padding:9px 12px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4);
  }

  .sheet{background:var(--panel);border-top:1px solid var(--line);max-height:36dvh;
    display:flex;flex-direction:column;transition:max-height .25s ease;flex-shrink:0}
  .sheet.collapsed{max-height:46px}
  .sheet-handle{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;
    cursor:pointer;flex-shrink:0;user-select:none}
  .sheet-handle h2{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .sheet-handle .arrow{color:var(--muted);font-size:12px;transition:transform .25s}
  .sheet.collapsed .arrow{transform:rotate(180deg)}
  .spot-list{overflow-y:auto;padding:0 8px 10px}
  .spot-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;
    border:0;color:var(--text);cursor:pointer;padding:10px 8px;border-radius:8px;font-size:13px}
  .spot-item:hover,.spot-item:focus-visible{background:var(--panel-2);outline:none}
  .spot-item .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .spot-item .name{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .spot-item .meta{font-size:11px;color:var(--muted);white-space:nowrap}

  /* Popup */
  .leaflet-popup-content-wrapper{background:var(--paper);color:var(--ink);border-radius:10px;
    box-shadow:0 6px 22px rgba(0,0,0,.5)}
  .leaflet-popup-content{margin:14px 16px;line-height:1.45;min-width:230px}
  .leaflet-popup-tip{background:var(--paper)}
  .pop-cat{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    color:#fff;border-radius:4px;padding:2px 7px;margin-bottom:5px;margin-right:4px}
  .pop-nr{font-size:10px;color:#5b6b66;letter-spacing:.05em}
  .pop-title{font-family:Georgia,serif;font-size:16px;font-weight:700;margin-bottom:2px}
  .pop-dist{font-size:11px;color:#5b6b66;margin-bottom:8px}
  .pop-row{font-size:12.5px;margin-bottom:6px}
  .pop-row b{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#5b6b66;margin-bottom:1px}
  .pop-note{font-size:11.5px;background:#dfe7df;border-left:3px solid var(--forelle);
    padding:6px 8px;border-radius:0 6px 6px 0;margin-top:8px;color:#33423d}
  .pop-warn{border-left-color:var(--warn);background:#eddcd8;color:#4a2a24}
  .pop-actions{display:flex;gap:6px;margin-top:10px}
  .pop-btn{flex:1;text-align:center;font-size:12px;font-weight:700;text-decoration:none;
    border-radius:7px;padding:8px 6px;border:0;cursor:pointer}
  .pop-btn.nav{background:#0f2b30;color:#e9efe9}
  .pop-btn.log{background:#e8b93c;color:#3a2f10}

  /* ===== Regeln ===== */
  .scrollpane{overflow-y:auto;padding:14px;flex:1}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px 14px;margin-bottom:12px}
  .card h3{font-family:Georgia,serif;font-size:15px;margin-bottom:8px;color:#f2f7f4}
  .rule-row{display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
  .rule-row:last-child{border-bottom:0}
  .rule-fish{font-weight:600}
  .rule-mm{color:var(--muted);font-size:12px}
  .badge{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    border-radius:5px;padding:3px 8px;white-space:nowrap}
  .badge.closed{background:#4a201a;color:#f0b6a8}
  .badge.open{background:#1f3d24;color:#a8dcae}
  .badge.info{background:#2a3f47;color:#a8cbd8}
  .card p{font-size:12.5px;color:var(--muted);line-height:1.5;margin-top:6px}
  .card ul{margin:6px 0 0 16px;font-size:12.5px;color:var(--text);line-height:1.6}
  .fineprint{font-size:11px;color:var(--muted);margin:4px 2px 20px;line-height:1.5}

  /* ===== Fangbuch ===== */
  .fb-form{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px;margin-bottom:12px}
  .fb-form h3{font-family:Georgia,serif;font-size:15px;margin-bottom:10px;color:#f2f7f4}
  .fb-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .fb-grid .full{grid-column:1/-1}
  label{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
  input,select{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:7px;
    color:var(--text);font-size:14px;padding:9px 10px}
  input:focus,select:focus{outline:2px solid var(--salmo);outline-offset:-1px}
  .fb-save{width:100%;margin-top:10px;background:var(--forelle);color:#3a2f10;border:0;border-radius:8px;
    padding:11px;font-size:14px;font-weight:700;cursor:pointer}
  .fb-entry{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13px}
  .fb-entry .info{flex:1;min-width:0}
  .fb-entry .fish{font-weight:700}
  .fb-entry .sub{font-size:11px;color:var(--muted)}
  .fb-del{background:none;border:0;color:var(--muted);font-size:16px;cursor:pointer;padding:6px}
  .fb-empty{text-align:center;color:var(--muted);font-size:13px;padding:24px 10px;line-height:1.5}
  .fb-status{font-size:11px;color:var(--muted);text-align:center;margin-top:8px}

  .mydlg-wrap{position:fixed;inset:0;background:rgba(6,16,18,.72);z-index:1200;display:flex;align-items:center;justify-content:center;padding:20px}
  .mydlg-wrap[hidden]{display:none!important}
  .mydlg{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;width:100%;max-width:380px}
  .mydlg h3{font-family:Georgia,serif;font-size:16px;margin-bottom:10px;color:#f2f7f4}
  .mydlg-btns{display:flex;gap:8px;margin-top:14px}
  .mydlg-btns button{flex:1;border:0;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;background:var(--forelle);color:#3a2f10}
  .mydlg-btns .ghost{background:var(--panel-2);color:var(--text);border:1px solid var(--line)}
  footer{grid-row:6;background:var(--panel);border-top:1px solid var(--line);
    padding:6px 14px calc(6px + env(safe-area-inset-bottom));font-size:10px;color:var(--muted)}
  footer a{color:var(--salmo)}

  @media(min-width:820px){
    .view.active{flex-direction:row;flex-wrap:wrap}
    .chips{width:100%}
    #map{flex:1;height:auto}
    .sheet{width:320px;max-height:none;border-top:0;border-left:1px solid var(--line)}
    .sheet.collapsed{max-height:none}
    .sheet-handle .arrow{display:none}
    .locbtn{right:calc(320px + 10px);bottom:28px}
    .scrollpane{max-width:720px;margin:0 auto;width:100%}
  }
  @media(prefers-reduced-motion:reduce){
    .sheet,.sheet-handle .arrow,.tab{transition:none}
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Revierwasserlaufanstalt · Osterzgebirge</div>
  <h1>Angelrevier Großhartmannsdorf <span class="tilde">~</span></h1>
  <div class="sun" id="sunline"></div>
  <div class="sun" id="wxline" aria-live="polite"></div>
  <select id="regionSel" aria-label="Region wählen" style="margin-top:6px;max-width:100%"></select>
</header>

<div class="banner" id="banner"></div>

<div class="tabs" role="tablist">
  <button class="tab" role="tab" aria-selected="true" data-view="karte">Karte</button>
  <button class="tab" role="tab" aria-selected="false" data-view="regeln">Regeln</button>
  <button class="tab" role="tab" aria-selected="false" data-view="fangbuch">Fangbuch</button>
</div>

<!-- KARTE -->
<div class="view active" id="view-karte">
  <div class="chips" id="chips" role="group" aria-label="Kategorien filtern"></div>
  <div class="chips sub" id="fishChips" role="group" aria-label="Nach Zielfisch filtern"></div>
  <div id="map"></div>
  <button class="locbtn" id="locbtn" title="Meinen Standort anzeigen">📍 Standort</button>
  <div class="sheet collapsed" id="sheet">
    <div class="sheet-handle" id="sheetHandle" role="button" tabindex="0" aria-label="Spotliste ein-/ausklappen">
      <h2>Spots <span id="spotCount"></span></h2>
      <span class="arrow">▼</span>
    </div>
    <div class="spot-list" id="spotList"></div>
  </div>
</div>

<!-- REGELN -->
<div class="view" id="view-regeln">
  <div class="scrollpane">
    <div class="card">
      <h3>Schonzeiten &amp; Maße – <span id="regionName"></span></h3>
      <div id="schonzeiten"></div>
    </div>
    <div id="regionRegeln"></div>
    <p class="fineprint" id="regionHinweis"></p>
  </div>
</div>

<!-- FANGBUCH -->
<div class="view" id="view-fangbuch">
  <div class="scrollpane">
    <div class="fb-form">
      <h3>Fang eintragen</h3>
      <div class="fb-grid">
        <div><label for="fbFisch">Fischart</label>
          <select id="fbFisch">
            <option>Hecht</option><option>Zander</option><option>Barsch</option>
            <option>Bachforelle</option><option>Regenbogenforelle</option><option>Döbel</option>
            <option>Karpfen</option><option>Schleie</option><option>Aal</option><option>Sonstige</option>
          </select></div>
        <div><label for="fbLaenge">Länge (cm)</label><input id="fbLaenge" type="number" inputmode="numeric" min="0" max="200" placeholder="z.B. 54"></div>
        <div class="full"><label for="fbSpot">Gewässer</label><select id="fbSpot"></select></div>
        <div class="full"><label for="fbKoeder">Köder / Methode</label><input id="fbKoeder" type="text" placeholder="z.B. Gummifisch 12cm, motoroil"></div>
      </div>
      <button class="fb-save" id="fbSave">Fang speichern</button>
      <div class="fb-status" id="fbStatus"></div>
    </div>
    <div id="fbList"></div>
  </div>
</div>

<div class="mydlg-wrap" id="kbDlg" hidden>
  <div class="mydlg">
    <h3>🎯 Köderberater</h3>
    <div id="kbBody" style="font-size:13px;line-height:1.55;max-height:55dvh;overflow-y:auto"></div>
    <div class="mydlg-btns"><button id="kbClose">Schließen</button></div>
  </div>
</div>

<div class="mydlg-wrap" id="myDlg" hidden>
  <div class="mydlg">
    <h3>Eigenen Spot speichern</h3>
    <label for="myName">Name</label>
    <input id="myName" type="text" placeholder="z.B. Kante vor der Schilfspitze" maxlength="60">
    <label for="myTipp" style="margin-top:8px">Notiz / Taktik</label>
    <input id="myTipp" type="text" placeholder="z.B. Zander 18 Uhr, Gummifisch motoroil 12 cm" maxlength="160">
    <div class="mydlg-btns">
      <button id="myCancel" class="ghost">Abbrechen</button>
      <button id="mySave">Speichern</button>
    </div>
  </div>
</div>

<footer>Koordinaten näherungsweise · <span id="footRegion"></span> · Fischereischein Pflicht</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

const NOW = new Date();
function inSchonzeit(s){ return !!s.von && inWindow(s.von,s.bis); }
function fmtMD(a){return String(a[1]).padStart(2,'0')+'.'+String(a[0]).padStart(2,'0')+'.';}
function haversine(a,b,c,d){
  const R=6371,p=Math.PI/180;
  const x=Math.sin((c-a)*p/2)**2+Math.cos(a*p)*Math.cos(c*p)*Math.sin((d-b)*p/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));
}
/* Sonnenauf-/untergang (vereinfacht, ausreichend genau) */
function sunTimes(lat,lng,date){
  const rad=Math.PI/180, J=Math.floor(date/864e5)+2440587.5-2451545+0.0009-lng/360;
  const n=Math.round(J), Js=2451545+0.0009-lng/360+n;
  const M=(357.5291+0.98560028*(Js-2451545))%360;
  const C=1.9148*Math.sin(M*rad)+0.02*Math.sin(2*M*rad);
  const L=(M+C+180+102.9372)%360;
  const Jt=Js+0.0053*Math.sin(M*rad)-0.0069*Math.sin(2*L*rad);
  const dec=Math.asin(Math.sin(L*rad)*Math.sin(23.4397*rad));
  const cosH=(Math.sin(-0.833*rad)-Math.sin(lat*rad)*Math.sin(dec))/(Math.cos(lat*rad)*Math.cos(dec));
  if(cosH<-1||cosH>1) return null;
  const H=Math.acos(cosH)/rad/360;
  const toDate=j=>new Date((j-2440587.5)*864e5);
  return {rise:toDate(Jt-H), set:toDate(Jt+H)};
}

  const code=err&&err.code;
  const msgs={
    1:'Standortfreigabe verweigert.\n\niPhone: Einstellungen → Datenschutz & Sicherheit → Ortungsdienste → Safari-Websites (bzw. die Home-Bildschirm-App) → "Beim Verwenden" + Website-Berechtigung erlauben.\n\nAndroid/Chrome: Schloss-Symbol in der Adressleiste → Berechtigungen → Standort zulassen.',

    3:'Zeitüberschreitung bei der Ortung – bitte erneut versuchen.'
  };
  alert(msgs[code]||('Standortfehler: '+((err&&err.message)||'unbekannt')));
}
locBtn.onclick=()=>{
  if(!navigator.geolocation) return alert('Standort wird von diesem Gerät/Browser nicht unterstützt.');
  if(window.isSecureContext===false) return alert('Standort erfordert HTTPS.');
  locBtn.disabled=true; const txt=locBtn.textContent; locBtn.textContent='⏳ Orte…';
  const finish=fn=>x=>{locBtn.disabled=false;locBtn.textContent=txt;fn(x);};
  navigator.geolocation.getCurrentPosition(
    finish(locApply),
    err=>{
      if(err&&err.code===3){
        /* iOS braucht für den ersten Fix oft länger: zweiter Versuch über watchPosition.
           done-Flag + nachgelagertes clearWatch decken auch synchrone Callbacks ab. */
        let wid=null, settled=false;
        const stop=()=>{ if(wid!=null){navigator.geolocation.clearWatch(wid);wid=null;} };
        wid=navigator.geolocation.watchPosition(
          p=>{settled=true;stop();finish(locApply)(p);},
          e=>{settled=true;stop();finish(locFail)(e);},
          {enableHighAccuracy:true,timeout:20000,maximumAge:0}
        );
        if(settled) stop();
      } else finish(locFail)(err);
    },
    {enableHighAccuracy:true,timeout:12000,maximumAge:60000}
  );
};

/* Spotliste */
const listEl=document.getElementById('spotList'), countEl=document.getElementById('spotCount');
const reduceMotion=matchMedia('(prefers-reduced-motion: reduce)').matches;
function renderList(){
  listEl.innerHTML='';
  let vis=SPOTS.filter(spotVisible);
  if(userPos){
    vis.forEach(s=>s._d=haversine(userPos[0],userPos[1],s.lat,s.lng));
    vis.sort((a,b)=>a._d-b._d);
  }
  countEl.textContent='('+vis.length+')';
  vis.forEach(s=>{
    const c=CATS[s.cat], b=document.createElement('button');
    b.className='spot-item';
    const meta=userPos?s._d.toFixed(1)+' km':s.fisch.split(',')[0];
    b.innerHTML=`<span class="dot" style="background:${c.color}"></span>
      <span class="name">${s.name}</span><span class="meta">${meta}</span>`;
    b.onclick=()=>{
      let opened=false;
      const open=()=>{if(!opened){opened=true;s.marker.openPopup(s.line?[s.lat,s.lng]:undefined);}};
      if(s.line){
        map.fitBounds(s.marker.getBounds(),{padding:[40,40]});
        map.once('moveend',open); setTimeout(open,800);
      }else if(reduceMotion){map.setView([s.lat,s.lng],13);open();}
      else{
        map.flyTo([s.lat,s.lng],13,{duration:.6});
        map.once('moveend',open);
        setTimeout(open,800); /* Fallback: Ziel = aktuelle Ansicht */
      }
      if(window.innerWidth<820) sheet.classList.add('collapsed');
    };
    listEl.appendChild(b);
  });
}
renderList();

const sheet=document.getElementById('sheet'), handle=document.getElementById('sheetHandle');

async function loadMySpots(rid){

}
function mySpotObj(m){
  return {name:esc(m.name),nr:'Eigener Spot',cat:'eigen',arten:[],lat:m.lat,lng:m.lng,
    fisch:'–',methode:'–',karte:'Eigener Spot (nur auf diesem Gerät gespeichert)',

async function saveMySpot(){

    name:document.getElementById('myName').value.trim()||'Eigener Spot',

window.delMySpot=async function(id){
  if(!REGION) return;
  const list=(await loadMySpots(REGION.id)).filter(m=>m.id!==id);
  try{await store.set('myspots:'+REGION.id,JSON.stringify(list));}catch(e){}

  if(i>-1){const sp=SPOTS[i]; if(sp.marker&&map.hasLayer(sp.marker))map.removeLayer(sp.marker); SPOTS.splice(i,1);}

/* ============ Wetter & Pegel (Open-Meteo + PEGELONLINE, keylos) ============ */
let wxKey='';
let WX=null; /* {temp,wind,dirDeg,dir,press,trendVal} für Wind-Taktik & Köderberater */
async function loadWeather(){
  if(!SPOTS.length) return;
  const pts=SPOTS.filter(sp=>!sp.my);
  const ctr=userPos?{lat:userPos[0],lng:userPos[1]}
    :{lat:pts.reduce((a,sp)=>a+sp.lat,0)/pts.length,lng:pts.reduce((a,sp)=>a+sp.lng,0)/pts.length};
  const key=ctr.lat.toFixed(2)+','+ctr.lng.toFixed(2);
  if(key===wxKey) return; wxKey=key;
  const el=document.getElementById('wxline');
  try{
    const u='https://api.open-meteo.com/v1/forecast?latitude='+ctr.lat.toFixed(3)+'&longitude='+ctr.lng.toFixed(3)
      +'&current=temperature_2m,wind_speed_10m,wind_direction_10m,surface_pressure&hourly=surface_pressure&past_days=1&forecast_days=1&timezone=auto';
    const d=await (await fetch(u)).json();
    const c=d.current;
    let trend='', trendVal=0;
    const idx=d.hourly&&d.hourly.time?d.hourly.time.indexOf(c.time.slice(0,13)+':00'):-1;
    if(idx>2){
      trendVal=d.hourly.surface_pressure[idx]-d.hourly.surface_pressure[idx-3];
      trend=trendVal<=-1.5?' ⇘ fällt – Beißtrigger!':trendVal>=1.5?' ⇗ steigt':' → stabil';
    }
    const dirs=['N','NO','O','SO','S','SW','W','NW'];
    const dir=dirs[Math.round((c.wind_direction_10m||0)/45)%8];
    WX={temp:c.temperature_2m,wind:c.wind_speed_10m,dirDeg:c.wind_direction_10m||0,dir,press:c.surface_pressure,trendVal};
    el.textContent='🌡 '+Math.round(c.temperature_2m)+'°C · 💨 '+Math.round(c.wind_speed_10m)+' km/h '+dir
      +' · '+Math.round(c.surface_pressure)+' hPa'+trend;
    loadPegel(ctr,el);
  }catch(e){ el.textContent=''; wxKey=''; }
}
async function loadPegel(ctr,el){
  try{
    const st=await (await fetch('https://www.pegelonline.wsv.de/webservices/rest-api/v2/stations.json?latitude='
      +ctr.lat.toFixed(3)+'&longitude='+ctr.lng.toFixed(3)+'&radius=30')).json();
    if(!Array.isArray(st)||!st.length) return;
    const s0=st[0];
    const m=await (await fetch('https://www.pegelonline.wsv.de/webservices/rest-api/v2/stations/'+s0.uuid+'/W/currentmeasurement.json')).json();
    if(m&&typeof m.value!=='undefined')
      el.textContent+=' · 🌊 '+s0.shortname.charAt(0)+s0.shortname.slice(1).toLowerCase()+': '+m.value+' cm';
  }catch(e){}
}

/* ============ Köderberater (regelbasiert, offline) ============ */
function season(){const m=NOW.getMonth()+1;return m===12||m<=2?'winter':m<=5?'fruehjahr':m<=8?'sommer':'herbst';}
const KB={
 Hecht:{fruehjahr:'Nach der Schonzeit in den erwärmten Flachbuchten: mittelgroße Gummis 12–16 cm, flach laufende Wobbler.',
  sommer:'Morgens/abends groß &amp; flach über Kraut: Jerkbaits, Spinnerbaits, 16–20-cm-Gummis. Mittags an die tiefen Kanten wechseln.',
  herbst:'XXL-Zeit: 20 cm+ Gummis und Swimbaits, langsam an tiefen Kanten – jetzt beißen die Großen.',
  winter:'Sehr langsam und tief: großer Gummifisch am schweren Kopf, lange Absinkphasen und Pausen.'},
 Zander:{fruehjahr:'Direkt nach der Schonzeit (Sachsen ab 01.06., MV ab 16.06.): Kanten 3–6 m, Gummi 10–12 cm, Faulenzen.',
  sommer:'Tagsüber tief an den Kanten jiggen (Gummi 10–12 cm), nachts flach ans Ufer – flach laufender Wobbler.',
  herbst:'Fressphase: größere Gummis 12–15 cm, härtere Jigs an den tiefsten Kanten, auch tagsüber Chancen.',
  winter:'Zentimeterarbeit am Grund: kleiner Gummi 8–10 cm, minimale Sprünge, sehr lange Pausen.'},
 Barsch:{fruehjahr:'Kleine Gummis am DropShot in Ufernähe, ab Mai Cranks über den ersten Krautfeldern.',
  sommer:'Morgens Oberfläche (Popper!), tagsüber Trupps mit DropShot und kleinen Cranks an Kanten suchen.',
  herbst:'Schwärme jagen im Freiwasser: Spinner, kleine Blinker, Crankbaits – schnelle Führung.',
  winter:'Tief und fein: DropShot mit kleinen Würmern, direkt vor der Nase anbieten.'},
 Forelle:{fruehjahr:'Fluss zu (Schonzeit bis 30.04.) – am Forellenteich: helle Teigfarben, langsam geführte Spoons.',
  sommer:'Früh und spät: kleine Spinner und Nymphen in den beschatteten Rinnen, mittags Pause.',
  herbst:'Aggressive Farben, etwas größere Spinner – Bachforellen ab Oktober geschont, Refo prüfen!',
  winter:'Fluss weitgehend zu – Forellenteich: Teig in Grundnähe, sehr langsam.'},
 Karpfen:{fruehjahr:'Flache, sonnige Buchten: Mais und helle Pop-ups, wenig Futter.',
  sommer:'Nachtangeln (wo erlaubt): Boilies fruchtig, Futterplatz klein halten – Schwimmbrot bei Sonne.',
  herbst:'Fressphase vor dem Winter: fischige Boilies, größere Futtermengen zahlen sich aus.',
  winter:'Sehr sparsam: einzelne helle Hookbaits an tiefen Löchern, Geduld.'},
 Aal:{fruehjahr:'Ab den ersten warmen Nächten: Tauwurm am Grund in Ufernähe.',
  sommer:'Beste Zeit: schwüle, dunkle Nächte – Tauwurmbündel oder Fischfetzen an Einläufen und Kanten.',
  herbst:'Bis Oktober: letzte warme Nächte nutzen, danach wird es zäh.',
  winter:'Praktisch aussichtslos – Aal ruht.'}
};
function kbHtml(){
  const se=season();
  const seName={fruehjahr:'Frühjahr',sommer:'Sommer',herbst:'Herbst',winter:'Winter'}[se];
  const fische=fishSel?[fishSel==='Forelle'?'Forelle':fishSel].filter(f=>KB[f]):['Hecht','Zander','Barsch'];
  let h='<p style="color:var(--muted);margin-bottom:10px">Saison: <b>'+seName+'</b>'
    +(WX?' · '+Math.round(WX.temp)+'°C · '+Math.round(WX.press)+' hPa':'')+'</p>';
  fische.forEach(f=>{ if(KB[f]) h+='<p style="margin-bottom:9px"><b>'+f+':</b> '+KB[f][se]+'</p>'; });
  if(WX){
    if(WX.trendVal<=-1.5) h+='<p style="margin-bottom:9px"><b>Druck fällt ('+WX.trendVal.toFixed(1)+' hPa/3h):</b> Fresslaune – aktiver und schneller führen, jetzt ans Wasser!</p>';
    else if(WX.trendVal>=1.5) h+='<p style="margin-bottom:9px"><b>Druck steigt:</b> nach der Front oft zäh – Köder verkleinern, langsamer führen, Tiefe suchen.</p>';
  }
  h+='<p style="color:var(--muted)">Wasser trüb: Schockfarben (firetiger, chartreuse) und laute Köder · Wasser klar: Naturdekore, leiser, dünnere Vorfächer.</p>';
  return h;
}
const kbDlg=document.getElementById('kbDlg');
function openKb(){document.getElementById('kbBody').innerHTML=kbHtml();kbDlg.hidden=false;}
document.getElementById('kbClose').onclick=()=>{kbDlg.hidden=true;};
kbDlg.addEventListener('click',e=>{if(e.target===kbDlg)kbDlg.hidden=true;});

/* Distanz im Popup nachtragen */
map.on('popupopen',e=>{
  const wEl=e.popup.getElement().querySelector('[data-wind]');
  if(wEl){
    if(WX&&WX.wind>=8){
      const dirs=['Nord','Nordost','Ost','Südost','Süd','Südwest','West','Nordwest'];
      const luv=dirs[Math.round(((WX.dirDeg+180)%360)/45)%8];
      wEl.innerHTML='<b>Wind-Taktik jetzt</b>💨 '+WX.dir+' '+Math.round(WX.wind)+' km/h drückt Nahrung ans <b>'+luv+'ufer</b> – dort anwerfen.';
    } else if(WX){
      wEl.innerHTML='<b>Wind-Taktik jetzt</b>Wenig Wind ('+Math.round(WX.wind)+' km/h) – Uferwahl frei, Kanten und Struktur entscheiden.';
    } else wEl.remove();
  }
  const el=e.popup.getElement().querySelector('[data-dist]');
  if(el){
    const [la,ln]=el.dataset.dist.split(',').map(Number);
    const c=map.getCenter();
    const ref=userPos||[c.lat,c.lng];
    el.textContent='~'+haversine(ref[0],ref[1],la,ln).toFixed(1)+' km '+(userPos?'von dir':'von Kartenmitte');
  }
});

/* ============ Fangbuch ============ */
const fbSpotSel=document.getElementById('fbSpot');
function buildFbOptions(){
  fbSpotSel.innerHTML='';
  SPOTS.filter(s=>s.cat!=='sperr'&&s.cat!=='info').forEach(s=>{
    const o=document.createElement('option'); o.textContent=s.name; fbSpotSel.appendChild(o);
  });
  const oAnd=document.createElement('option'); oAnd.textContent='Anderes Gewässer'; fbSpotSel.appendChild(oAnd);
}

let fbMem=[]; let persistent=true;
async function fbLoad(){
  try{
    const r=await store.get('fangbuch');
    fbMem=r&&r.value?JSON.parse(r.value):[];
  }catch(e){ fbMem=[]; }
  fbRender();
}
async function fbPersist(){
  try{ await store.set('fangbuch',JSON.stringify(fbMem)); }
  catch(e){ persistent=false; }
  fbRender();
}
function fbRender(){
  const list=document.getElementById('fbList');
  document.getElementById('fbStatus').textContent=
    persistent?'Wird dauerhaft gespeichert':'Hinweis: Speicherung nur für diese Sitzung';
  if(!fbMem.length){
    list.innerHTML='<div class="fb-empty">Noch keine Fänge eingetragen.<br>Petri Heil – der erste kommt bestimmt! 🐟</div>';
    return;
  }
  list.innerHTML='';
  [...fbMem].reverse().forEach(e=>{
    const d=document.createElement('div'); d.className='fb-entry';
    d.innerHTML=`<div class="info"><div class="fish">${esc(e.fisch)} ${e.laenge?'· '+esc(e.laenge)+' cm':''}</div>
      <div class="sub">${esc(e.spot)} · ${esc(e.datum)}${e.koeder?' · '+esc(e.koeder):''}</div></div>
      <button class="fb-del" aria-label="Eintrag löschen" data-id="${esc(e.id)}">✕</button>`;
    d.querySelector('.fb-del').onclick=async ev=>{
      await fbReady;
      fbMem=fbMem.filter(x=>x.id!==Number(ev.currentTarget.dataset.id));
      await fbPersist();
    };
    list.appendChild(d);
  });
}
document.getElementById('fbSave').onclick=async ()=>{
  await fbReady; /* verhindert, dass fbLoad einen frischen Eintrag überschreibt */
  const fisch=document.getElementById('fbFisch').value;
  const laenge=document.getElementById('fbLaenge').value;
  fbMem.push({
    id:Date.now(), fisch, laenge,
    spot:fbSpotSel.value,
    koeder:document.getElementById('fbKoeder').value.trim(),
    datum:new Date().toLocaleDateString('de-DE')
  });
  document.getElementById('fbLaenge').value='';
  document.getElementById('fbKoeder').value='';
  await fbPersist();
};
function prefillFang(spotName){
  document.querySelectorAll('.tab').forEach(x=>x.setAttribute('aria-selected','false'));
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.querySelector('[data-view="fangbuch"]').setAttribute('aria-selected','true');
  document.getElementById('view-fangbuch').classList.add('active');
  [...fbSpotSel.options].forEach(o=>{if(o.textContent===spotName)fbSpotSel.value=spotName;});
}
window.prefillFang=prefillFang;
const fbReady=fbLoad();
initRegions();

/* Offline-Modus: Service Worker (nur auf eigener HTTPS-Domain, im Artifact still ignoriert) */
if('serviceWorker' in navigator&&location.protocol==='https:'){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
